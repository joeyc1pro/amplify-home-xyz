<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Amplify Lessons</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Mono&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #111113;
      color: #e8e8e8;
      min-height: 100vh;
      padding: 3rem 1.5rem;
    }

    .wrap {
      max-width: 640px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 3rem;
    }

    .site-label {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: #555;
      letter-spacing: 0.08em;
      margin-bottom: 0.5rem;
    }

    h1 {
      font-size: 28px;
      font-weight: 500;
      color: #e8e8e8;
    }

    .lessons-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .lesson-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #1c1c1f;
      border: 1px solid #2a2a2e;
      border-radius: 10px;
      padding: 1.1rem 1.25rem;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, background 0.15s;
    }

    .lesson-link:hover {
      border-color: #444;
      background: #222226;
    }

    .lesson-name {
      font-size: 16px;
      font-weight: 500;
      color: #e8e8e8;
    }

    .lesson-path {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: #555;
      margin-top: 2px;
    }

    .arrow {
      color: #444;
      font-size: 18px;
      transition: color 0.15s, transform 0.15s;
    }

    .lesson-link:hover .arrow {
      color: #888;
      transform: translateX(3px);
    }

    footer {
      margin-top: 3rem;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: #333;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <p class="site-label">joeyc1pro / amplify</p>
      <h1>Lessons</h1>
    </header>

    <div class="lessons-list">

      <a class="lesson-link" href="./lessons/drive-mad">
        <div>
          <p class="lesson-name">Drive Mad</p>
          <p class="lesson-path">/lessons/drive-mad</p>
        </div>
        <span class="arrow">→</span>
      </a>

      <a class="lesson-link" href="./lessons/1.8.8">
        <div>
          <p class="lesson-name">1.8.8</p>
          <p class="lesson-path">/lessons/1.8.8</p>
        </div>
        <span class="arrow">→</span>
      </a>

      <a class="lesson-link" href="./lessons/draw-the-hill">
        <div>
          <p class="lesson-name">Draw the Hill</p>
          <p class="lesson-path">/lessons/draw-the-hill</p>
        </div>
        <span class="arrow">→</span>
      </a>

      <a class="lesson-link" href="./lessons/rocket-league">
        <div>
          <p class="lesson-name">Rocket League</p>
          <p class="lesson-path">/lessons/rocket-league</p>
        </div>
        <span class="arrow">→</span>
      </a>

      <a class="lesson-link" href="./lessons/basket-random">
        <div>
          <p class="lesson-name">Basket Random</p>
          <p class="lesson-path">/lessons/basket-random</p>
        </div>
        <span class="arrow">→</span>
      </a>

      <a class="lesson-link" href="./lessons/BackflipManiac">
        <div>
          <p class="lesson-name">Backflip Maniac</p>
          <p class="lesson-path">/lessons/BackflipManiac</p>
        </div>
        <span class="arrow">→</span>
      </a>

    </div>

    <footer>amplify-home-xyz</footer>
  </div>
</body>
</html>
