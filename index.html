<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Amplify Lessons</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/amplify-home-xyz/style.css">
</head>

<body>

<div class="custom-cursor"></div>

<div class="wrap">

  <h1>Lessons</h1>
  <p class="sub">Search by name or tag</p>

  <div class="stats-bar">
    <div class="stat">
      <div class="stat-value">26</div>
      <div class="stat-label">Total</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="shown">26</div>
      <div class="stat-label">Showing</div>
    </div>
  </div>

  <!-- SEARCH + FILTERS -->
  <div class="controls">
    <input id="search" class="search-input" placeholder="Search lessons or tags..."/>

    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="fav">Favorites</button>
  </div>

  <!-- LIST -->
  <div id="list">

    <a class="lesson-link" data-name="1.8.8" data-tags="survival minecraft" href="./lessons/g1">
      <img class="lesson-icon" src="/amplify-home-xyz/lessons/g1/icon.png"
        onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'icon-placeholder'}))">
      <span>1.8.8</span><span class="tag">Survival</span><span class="fav">☆</span>
    </a>

    <a class="lesson-link" data-name="among us online" data-tags="multiplayer social" href="./lessons/g2">
      <img class="lesson-icon" src="/amplify-home-xyz/lessons/g2/icon.png"
        onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'icon-placeholder'}))">
      <span>Among Us Online</span><span class="tag">Multiplayer</span><span class="fav">☆</span>
    </a>

    <a class="lesson-link" data-name="aquapark io" data-tags="racing physics" href="./lessons/g3">
      <img class="lesson-icon" src="/amplify-home-xyz/lessons/g3/icon.png"
        onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'icon-placeholder'}))">
      <span>Aquapark.io</span><span class="tag">Racing</span><span class="fav">☆</span>
    </a>

    <a class="lesson-link" data-name="backflip maniac" data-tags="physics stunt" href="./lessons/g4">
      <img class="lesson-icon" src="/amplify-home-xyz/lessons/g4/icon.png"
        onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'icon-placeholder'}))">
      <span>Backflip Maniac</span><span class="tag">Physics</span><span class="fav">☆</span>
    </a>

    <!-- ... KEEP YOUR SAME 26 ENTRIES EXACTLY LIKE THIS PATTERN ... -->

  </div>

</div>

<!-- ================= JS ================= -->
<script>
document.addEventListener("DOMContentLoaded", () => {

  const search = document.getElementById("search");
  const links = document.querySelectorAll(".lesson-link");
  const shown = document.getElementById("shown");
  const buttons = document.querySelectorAll(".filter-btn");

  let mode = "all";

  function getFavs() {
    return JSON.parse(localStorage.getItem("favs") || "[]");
  }

  function setFavs(v) {
    localStorage.setItem("favs", JSON.stringify(v));
  }

  function toggleFav(name) {
    let favs = getFavs();

    if (favs.includes(name)) {
      favs = favs.filter(x => x !== name);
    } else {
      favs.push(name);
    }

    setFavs(favs);
    render();
  }

  // FILTER BUTTONS (THIS FIXES YOUR ISSUE)
  buttons.forEach(btn => {
    btn.addEventListener("click", () => {
      buttons.forEach(b => b.classList.remove("active"));
      btn.classList.add("active");

      mode = btn.dataset.filter;
      render();
    });
  });

  function render() {
    const q = search.value.toLowerCase().trim();
    const favs = getFavs();

    let count = 0;

    links.forEach(link => {

      const name = link.dataset.name;
      const tags = (link.dataset.tags || "").toLowerCase();

      const matchesSearch =
        name.toLowerCase().includes(q) ||
        tags.includes(q);

      let matchesFilter = true;

      if (mode === "fav") {
        matchesFilter = favs.includes(name);
      }

      const show = matchesSearch && matchesFilter;

      link.style.display = show ? "flex" : "none";

      const star = link.querySelector(".fav");
      star.textContent = favs.includes(name) ? "★" : "☆";

      if (show) count++;
    });

    shown.textContent = count;
  }

  // FAVORITE STAR CLICK (EVENT DELEGATION FIX)
  document.addEventListener("click", (e) => {
    if (e.target.classList.contains("fav")) {
      const link = e.target.closest(".lesson-link");
      toggleFav(link.dataset.name);
    }
  });

  search.addEventListener("input", render);

  render();

  // CUSTOM CURSOR
  const cursor = document.querySelector(".custom-cursor");

  document.addEventListener("mousemove", e => {
    cursor.style.left = e.clientX + "px";
    cursor.style.top = e.clientY + "px";
  });

});
</script>

</body>
</html>
