<!-- ================= SYSTEM SCRIPT ================= -->
<script>
document.addEventListener("DOMContentLoaded", () => {

const search = document.getElementById("search");
const shown = document.getElementById("shown");
const list = document.getElementById("list");

const homeView = document.getElementById("home-view");
const gameView = document.getElementById("game-view");
const iframe = document.getElementById("game-frame");
const loader = document.getElementById("loader");
const backBtn = document.getElementById("back-btn");

let mode = "all";

/* ================= RENDER ================= */
function renderGames() {
  list.innerHTML = GAMES.map(g => `
    <a class="lesson-link"
       data-name="${g.name}"
       data-tags="${g.tags}"
       data-url="./lessons/${g.id}">

      <img class="lesson-icon"
           src="./lessons/${g.id}/icon.png"
           onerror="this.replaceWith(document.createElement('div')).className='icon-placeholder'">

      <span>${g.name}</span>
      <span class="tag">${g.tags.split(" ")[0]}</span>
      <span class="fav">☆</span>
    </a>
  `).join("");
}

/* ================= FAVORITES ================= */
function getFavs() {
  return JSON.parse(localStorage.getItem("favs") || "[]");
}
function setFavs(a) {
  localStorage.setItem("favs", JSON.stringify(a));
}

/* ================= FILTER ================= */
function render() {
  const q = search.value.toLowerCase().trim();
  const favs = getFavs();
  let count = 0;

  document.querySelectorAll(".lesson-link").forEach(card => {

    const name = card.dataset.name;
    const tags = card.dataset.tags;

    let show = name.toLowerCase().includes(q) || tags.toLowerCase().includes(q);

    if (mode === "fav" && !favs.includes(name)) show = false;

    card.style.display = show ? "flex" : "none";

    card.querySelector(".fav").textContent =
      favs.includes(name) ? "★" : "☆";

    if (show) count++;
  });

  shown.textContent = count;
}

/* ================= OPEN GAME ================= */
document.addEventListener("click", e => {

  const fav = e.target.closest(".fav");
  if (fav) {
    const card = fav.closest(".lesson-link");
    const name = card.dataset.name;

    let favs = getFavs();
    favs = favs.includes(name)
      ? favs.filter(x => x !== name)
      : [...favs, name];

    setFavs(favs);
    render();
    return;
  }

  const card = e.target.closest(".lesson-link");
  if (!card) return;

  const url = card.dataset.url;

  homeView.style.display = "none";
  gameView.style.display = "block";

  loader.style.display = "block";
  iframe.style.display = "none";

  iframe.src = url;
});

/* ================= IFRAME LOAD ================= */
iframe.addEventListener("load", () => {
  loader.style.display = "none";
  iframe.style.display = "block";
});

/* ================= BACK ================= */
backBtn.addEventListener("click", () => {
  iframe.src = "";
  gameView.style.display = "none";
  homeView.style.display = "block";
});

/* ================= SEARCH ================= */
search.addEventListener("input", render);

/* ================= INIT ================= */
renderGames();
render();

});
</script>
